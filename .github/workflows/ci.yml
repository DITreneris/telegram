name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python dev dependencies
        run: pip install -r requirements-dev.txt
      - name: Pytest
        run: python -m pytest
      - name: Posts / PNG / polls alignment audit
        run: python scripts/audit_posts_png_quizzes.py

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Sync polls for web build
        run: node scripts/sync_polls_to_web.mjs
      - name: Install and build web
        working-directory: web
        run: |
          npm ci
          npm run build

  api_ts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install root dependencies, typecheck and test api/
        run: |
          npm ci
          npm run check:api
          npm run test:api

  dependency_audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: npm audit (root)
        run: |
          npm ci
          npm audit --omit=dev
        continue-on-error: true
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: npm audit (web)
        working-directory: web
        run: |
          npm ci
          npm audit --omit=dev
        continue-on-error: true

  pip_audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: pip-audit requirements.txt
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt
        continue-on-error: true
